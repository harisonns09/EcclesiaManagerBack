# --- ConfiguraÁıes do JWT ---
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.issuer=auth-api
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem

# Garante que o Quarkus saiba onde ler as permissıes (Admin, LÌder) dentro do token
smallrye.jwt.path.groups=groups

# --- REGRAS DE ACESSO (SeguranÁa Blindada) ---

# 1. PASSE LIVRE PARA O CORS (PREFLIGHT)
# Tem que ser /api/* para ter forÁa suficiente para vencer a regra de bloqueio!
quarkus.http.auth.permission.cors.paths=/api/*
quarkus.http.auth.permission.cors.policy=permit
quarkus.http.auth.permission.cors.methods=OPTIONS

# 2. ROTAS P⁄BLICAS REAIS (Apenas o estritamente necess·rio sem login)
quarkus.http.auth.permission.public.paths=/api/auth/*,/api/webhooks/*,/api/public/*
quarkus.http.auth.permission.public.policy=permit

# 3. BLOQUEIO GLOBAL (Tudo que n„o for p˙blico, EXIGE token)
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated


# --- OBSERVABILIDADE E LOGS ---
# Formata o SQL do Hibernate para ficar indentado e f·cil de ler (j· que o log.sql=true est· ativo)
quarkus.hibernate-orm.log.format-sql=true

# Habilita o log de acesso HTTP (Mostra as requisiÁıes que chegam do React)
quarkus.http.access-log.enabled=true
# Usa um padr„o de log mais descritivo
quarkus.http.access-log.pattern=%h %l %u %t "%r" %s %b "%{i,Referer}" "%{i,User-Agent}" "%{X-Forwarded-For}i"


